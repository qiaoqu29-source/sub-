<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Subliminal Studio Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --surface: #13101c;
    --accent: #c8a8ff;
    --accent2: #f0c0e8;
    --text: #e8e0f5;
    --muted: rgba(232,224,245,0.45);
    --border: rgba(200,170,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 40px 24px; }
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 16px; }
  .card-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); opacity: 0.6; margin-bottom: 15px; }

  .upload-zone { border: 1.5px dashed rgba(200,168,255,0.25); border-radius: 14px; padding: 40px; text-align: center; cursor: pointer; }
  #fileInput { display: none; }
  
  .slider-display { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .slider-value { font-family: 'Cormorant Garamond', serif; font-size: 42px; color: var(--accent); }
  
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(200,168,255,0.1); outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }

  .process-btn { width: 100%; padding: 18px; border-radius: 14px; background: rgba(200,168,255,0.1); border: 1px solid var(--accent); color: var(--accent); font-family: 'Cormorant Garamond', serif; font-size: 20px; cursor: pointer; transition: 0.3s; }
  .process-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .process-btn:hover:not(:disabled) { background: rgba(200,168,255,0.2); }

  .progress-area { display: none; margin-top: 20px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s linear; }
  .progress-text { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }

  .download-area { display: none; text-align: center; margin-top: 20px; }
  .download-btn { display: inline-block; padding: 14px 30px; border-radius: 100px; background: var(--accent); color: var(--bg); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>

<div class="container">
  <header><h1>Subliminal Ultra</h1></header>

  <div class="card">
    <p class="card-label">01 — 音源</p>
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept="audio/*">
      <p id="fileStatus">点击上传音频</p>
    </div>
  </div>

  <div class="card">
    <p class="card-label">02 — 参数 (极速版)</p>
    <div style="margin-bottom: 25px;">
      <label style="font-size:12px; color:var(--muted)">重复/叠加次数 (2 - 1000)</label>
      <div class="slider-display"><span class="slider-value" id="repeatVal">10</span><span>次</span></div>
      <input type="range" id="repeatSlider" min="2" max="1000" value="10" oninput="document.getElementById('repeatVal').innerText=this.value">
    </div>

    <div style="margin-bottom: 10px;">
      <label style="font-size:12px; color:var(--muted)">每层音量 (1% - 100%)</label>
      <div class="slider-display"><span class="slider-value" id="volVal">80</span><span>%</span></div>
      <input type="range" id="volSlider" min="1" max="100" value="80" oninput="document.getElementById('volVal').innerText=this.value">
    </div>
  </div>

  <div class="card">
    <button class="process-btn" id="processBtn" disabled onclick="startProcessing()">开始极速处理</button>
    
    <div class="progress-area" id="progressArea">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-text" id="progressText">准备中...</p>
    </div>

    <div class="download-area" id="downloadArea">
      <a class="download-btn" id="downloadLink">下载生成的音频</a>
    </div>
  </div>
</div>

<script>
let audioBuffer = null;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileStatus').innerText = "加载中...";
  const arrayBuffer = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  document.getElementById('fileStatus').innerText = `已就绪: ${file.name}`;
  document.getElementById('processBtn').disabled = false;
};

async function startProcessing() {
  const repeats = parseInt(document.getElementById('repeatSlider').value);
  const vol = document.getElementById('volSlider').value / 100;
  const btn = document.getElementById('processBtn');
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('progressText');

  btn.disabled = true;
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('downloadArea').style.display = 'none';

  const { sampleRate, numberOfChannels, duration } = audioBuffer;
  // 计算时长：1000次叠加的时长与原音频一致
  const offlineCtx = new OfflineAudioContext(numberOfChannels, Math.ceil(sampleRate * duration), sampleRate);

  txt.innerText = "正在注入潜意识层...";
  
  // 分批次处理以提高性能，避免阻塞
  const batchSize = 50;
  for (let i = 0; i < repeats; i++) {
    const source = offlineCtx.createBufferSource();
    const gainNode = offlineCtx.createGain();
    
    source.buffer = audioBuffer;
    gainNode.gain.value = vol;
    
    source.connect(gainNode);
    gainNode.connect(offlineCtx.destination);
    source.start(0);

    if (i % batchSize === 0) {
      const progress = Math.round((i / repeats) * 60);
      fill.style.width = progress + "%";
      txt.innerText = `正在叠加第 ${i} 层...`;
      await new Promise(r => setTimeout(r, 0)); // 让出主线程
    }
  }

  fill.style.width = "70%";
  txt.innerText = "量子渲染中 (这步最快)...";

  const renderedBuffer = await offlineCtx.startRendering();
  
  fill.style.width = "90%";
  txt.innerText = "正在导出高保真文件...";
  
  const wavBlob = bufferToWav(renderedBuffer);
  const url = URL.createObjectURL(wavBlob);
  
  document.getElementById('downloadLink').href = url;
  document.getElementById('downloadLink').download = `sub_ultra_x${repeats}.wav`;
  
  fill.style.width = "100%";
  txt.innerText = "生成成功！";
  document.getElementById('downloadArea').style.display = 'block';
  btn.disabled = false;
}

// 高效 WAV 编码器
function bufferToWav(abuffer) {
  let numOfChan = abuffer.numberOfChannels,
      length = abuffer.length * numOfChan * 2 + 44,
      buffer = new ArrayBuffer(length),
      view = new DataView(buffer),
      channels = [], i, sample,
      offset = 0,
      pos = 0;

  function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
  function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

  setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
  setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
  setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
  setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);

  for(i=0; i<numOfChan; i++) channels.push(abuffer.getChannelData(i));

  while(pos < length) {
    for(i=0; i<numOfChan; i++) {
      sample = Math.max(-1, Math.min(1, channels[i][offset]));
      sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
      view.setInt16(pos, sample, true);
      pos += 2;
    }
    offset++;
  }
  return new Blob([buffer], {type: "audio/wav"});
}
</script>
</body>
</html>
