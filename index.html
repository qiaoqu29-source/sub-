<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Subliminal Studio Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --surface: #13101c;
    --surface2: #1a1525;
    --border: rgba(200,170,255,0.12);
    --accent: #c8a8ff;
    --accent2: #f0c0e8;
    --accent3: #8fd0ff;
    --text: #e8e0f5;
    --muted: rgba(232,224,245,0.45);
    --glow: rgba(200,168,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(120,80,200,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(200,100,180,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 90% 20%, rgba(80,150,220,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  header { text-align: center; margin-bottom: 56px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 8vw, 64px);
    font-weight: 300;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  .subtitle { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.6;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .upload-zone {
    border: 1.5px dashed rgba(200,168,255,0.25);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    background: rgba(200,168,255,0.02);
  }

  #fileInput { display: none; }

  .upload-icon { font-size: 36px; margin-bottom: 14px; display: block; }

  .file-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent2);
    margin-top: 10px;
    font-style: italic;
  }

  .controls-grid { display: grid; gap: 28px; }

  .control-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .mode-btn {
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
  }

  .mode-btn.active {
    border-color: rgba(200,168,255,0.45);
    background: rgba(200,168,255,0.08);
    color: var(--accent);
  }

  .slider-display {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
  }

  .slider-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    color: var(--accent);
    line-height: 1;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--accent) var(--pct, 0%), rgba(200,168,255,0.15) var(--pct, 0%));
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
  }

  .process-btn {
    width: 100%;
    padding: 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(180,130,255,0.15), rgba(100,170,255,0.1));
    border: 1px solid rgba(200,168,255,0.35);
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    cursor: pointer;
  }

  .process-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-area { display: none; margin-top: 20px; }
  .progress-area.show { display: block; }

  .progress-bar-track { height: 3px; background: rgba(200,168,255,0.1); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.1s; }

  .download-area { display: none; text-align: center; padding-top: 8px; }
  .download-area.show { display: block; }

  .download-btn {
    display: inline-flex;
    padding: 14px 32px;
    border-radius: 100px;
    background: rgba(200,168,255,0.2);
    border: 1px solid var(--accent);
    color: var(--text);
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <p class="eyebrow">✦ Professional Audio Manifestation</p>
    <h1>Subliminal<br>Studio Pro</h1>
  </header>

  <div class="card">
    <p class="card-label">01 — 上传</p>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="audio/*">
      <span class="upload-icon">✦</span>
      <p id="fileName" class="file-name" style="display:none"></p>
      <p class="upload-text">点击或拖拽肯定语音频</p>
    </div>
  </div>

  <div class="card">
    <p class="card-label">02 — 高级设置</p>
    <div class="controls-grid">
      <div class="control-group">
        <label>叠加模式</label>
        <div class="mode-toggle">
          <button class="mode-btn active" onclick="setMode('concat', this)">🔗 顺序拼接</button>
          <button class="mode-btn" onclick="setMode('overlay', this)">✦ 同步叠加</button>
        </div>
      </div>

      <div class="control-group">
        <label>重复次数 (Max 1000)</label>
        <div class="slider-display">
          <span class="slider-value" id="repeatVal">10</span>
          <span class="slider-unit">次</span>
        </div>
        <input type="range" id="repeatSlider" min="2" max="1000" value="10" oninput="updateSlider(this, 'repeatVal')">
      </div>

      <div class="control-group" id="volGroup" style="display:none">
        <label>每层音量 (Min 1%)</label>
        <div class="slider-display">
          <span class="slider-value" id="volVal">80</span>
          <span class="slider-unit">%</span>
        </div>
        <input type="range" id="volSlider" min="1" max="100" value="80" oninput="updateSlider(this, 'volVal')">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-label">03 — 生成</p>
    <button class="process-btn" id="processBtn" disabled onclick="processAudio()">✦ 开始处理</button>
    <div class="progress-area" id="progressArea">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <p id="progressText" style="font-size:12px; margin-top:10px; text-align:center"></p>
    </div>
    <div class="download-area" id="downloadArea">
      <a class="download-btn" id="downloadLink">⬇ 下载高频音频</a>
    </div>
  </div>
</div>

<script>
let audioBuffer = null;
let currentMode = 'concat';
let audioCtx = null;

function updateSlider(el, valId) {
  const pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  if (valId) document.getElementById(valId).textContent = el.value;
}
updateSlider(document.getElementById('repeatSlider'), 'repeatVal');
updateSlider(document.getElementById('volSlider'), 'volVal');

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('volGroup').style.display = mode === 'overlay' ? 'block' : 'none';
}

const fileInput = document.getElementById('fileInput');
document.getElementById('uploadZone').onclick = () => fileInput.click();
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileName').style.display = 'block';
    const reader = new FileReader();
    reader.onload = async (ev) => {
      audioCtx = audioCtx || new AudioContext();
      audioBuffer = await audioCtx.decodeAudioData(ev.target.result);
      document.getElementById('processBtn').disabled = false;
    };
    reader.readAsArrayBuffer(file);
  }
};

async function processAudio() {
  const repeats = parseInt(document.getElementById('repeatSlider').value);
  const vol = parseInt(document.getElementById('volSlider').value) / 100;
  const btn = document.getElementById('processBtn');
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('progressText');
  
  btn.disabled = true;
  document.getElementById('progressArea').classList.add('show');
  document.getElementById('downloadArea').classList.remove('show');

  const { sampleRate, numberOfChannels: channels, duration } = audioBuffer;
  let offlineCtx;

  if (currentMode === 'concat') {
    offlineCtx = new OfflineAudioContext(channels, Math.ceil(sampleRate * duration * repeats), sampleRate);
    for (let i = 0; i < repeats; i++) {
      const src = offlineCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(offlineCtx.destination);
      src.start(i * duration);
      if (i % 20 === 0) {
        fill.style.width = (i / repeats * 50) + '%';
        txt.textContent = `编排中: ${i}/${repeats}`;
        await new Promise(r => setTimeout(r, 0));
      }
    }
  } else {
    offlineCtx = new OfflineAudioContext(channels, Math.ceil(sampleRate * duration), sampleRate);
    for (let i = 0; i < repeats; i++) {
      const src = offlineCtx.createBufferSource();
      const gain = offlineCtx.createGain();
      gain.gain.value = vol;
      src.buffer = audioBuffer;
      src.connect(gain).connect(offlineCtx.destination);
      src.start(0);
      if (i % 20 === 0) {
        fill.style.width = (i / repeats * 50) + '%';
        txt.textContent = `叠加中: ${i}/${repeats}`;
        await new Promise(r => setTimeout(r, 0));
      }
    }
  }

  txt.textContent = "量子渲染中，请稍候...";
  fill.style.width = "70%";
  const rendered = await offlineCtx.startRendering();
  
  txt.textContent = "正在封装 WAV...";
  fill.style.width = "90%";
  const blob = bufferToWav(rendered);
  
  document.getElementById('downloadLink').href = URL.createObjectURL(blob);
  document.getElementById('downloadLink').download = `sub_x${repeats}.wav`;
  document.getElementById('downloadArea').classList.add('show');
  document.getElementById('progressArea').classList.remove('show');
  btn.disabled = false;
}

function bufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const samples = buffer.length;
  const blockAlign = numChannels * 2;
  const dataSize = samples * blockAlign;
  const arrayBuffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(arrayBuffer);

  const writeString = (offset, string) => {
    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
  };

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let s = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([arrayBuffer], { type: 'audio/wav' });
}
</script>
</body>
</html>
