
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Subliminal Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --surface: #13101c;
    --surface2: #1a1525;
    --border: rgba(200,170,255,0.12);
    --accent: #c8a8ff;
    --accent2: #f0c0e8;
    --accent3: #8fd0ff;
    --text: #e8e0f5;
    --muted: rgba(232,224,245,0.45);
    --glow: rgba(200,168,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(120,80,200,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(200,100,180,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 90% 20%, rgba(80,150,220,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 8vw, 64px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,168,255,0.4), transparent);
  }

  .card:hover {
    border-color: rgba(200,170,255,0.22);
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.6;
    margin-bottom: 20px;
    font-weight: 500;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed rgba(200,168,255,0.25);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    background: rgba(200,168,255,0.02);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: rgba(200,168,255,0.5);
    background: rgba(200,168,255,0.05);
    transform: scale(1.005);
  }

  .upload-zone.has-file {
    border-color: rgba(200,168,255,0.4);
    background: rgba(200,168,255,0.06);
    border-style: solid;
  }

  #fileInput { display: none; }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 14px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(200,168,255,0.4));
  }

  .upload-text {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .file-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent2);
    margin-top: 10px;
    font-style: italic;
  }

  /* Controls */
  .controls-grid {
    display: grid;
    gap: 28px;
  }

  .control-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  /* Mode toggle */
  .mode-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .mode-btn {
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }

  .mode-btn.active {
    border-color: rgba(200,168,255,0.45);
    background: rgba(200,168,255,0.08);
    color: var(--accent);
  }

  .mode-btn:hover:not(.active) {
    border-color: rgba(200,168,255,0.2);
    color: var(--text);
  }

  .mode-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.6;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border-left: 2px solid rgba(200,168,255,0.3);
  }

  /* Slider */
  .slider-wrapper {
    position: relative;
  }

  .slider-display {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
  }

  .slider-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 30px rgba(200,168,255,0.3);
  }

  .slider-unit {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent) var(--pct, 0%), rgba(200,168,255,0.15) var(--pct, 0%));
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
    box-shadow: 0 0 12px rgba(200,168,255,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 20px rgba(200,168,255,0.6);
  }

  .slider-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    padding: 0 2px;
  }

  .slider-ticks span {
    font-size: 10px;
    color: var(--muted);
    opacity: 0.5;
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .vol-label { font-size: 12px; color: var(--muted); min-width: 32px; text-align: right; }

  /* Process button */
  .process-btn {
    width: 100%;
    padding: 18px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, rgba(180,130,255,0.15) 0%, rgba(200,100,180,0.1) 50%, rgba(100,170,255,0.1) 100%);
    border: 1px solid rgba(200,168,255,0.35);
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  .process-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,168,255,0.08), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .process-btn:hover:not(:disabled)::before { opacity: 1; }
  .process-btn:hover:not(:disabled) {
    border-color: rgba(200,168,255,0.6);
    box-shadow: 0 0 30px rgba(200,168,255,0.15);
    transform: translateY(-1px);
  }

  .process-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Progress */
  .progress-area {
    display: none;
    margin-top: 20px;
  }

  .progress-area.show { display: block; }

  .progress-bar-track {
    height: 3px;
    background: rgba(200,168,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(200,168,255,0.5);
  }

  .progress-text {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Download area */
  .download-area {
    display: none;
    text-align: center;
    padding-top: 8px;
  }

  .download-area.show { display: block; }

  .done-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--accent2);
    margin-bottom: 16px;
    text-shadow: 0 0 20px rgba(240,192,232,0.3);
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    border-radius: 100px;
    background: linear-gradient(135deg, rgba(200,168,255,0.2), rgba(240,192,232,0.15));
    border: 1px solid rgba(200,168,255,0.4);
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.06em;
    transition: all 0.3s;
    cursor: pointer;
  }

  .download-btn:hover {
    background: linear-gradient(135deg, rgba(200,168,255,0.3), rgba(240,192,232,0.25));
    box-shadow: 0 0 24px rgba(200,168,255,0.2);
    transform: translateY(-2px);
  }

  .info-box {
    background: rgba(143,208,255,0.05);
    border: 1px solid rgba(143,208,255,0.15);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 13px;
    color: rgba(143,208,255,0.7);
    line-height: 1.7;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    animation: float-up linear infinite;
  }

  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 0.5; transform: translateY(-40px) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(0.5); }
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .shimmer {
    animation: pulse-glow 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <p class="eyebrow">✦ Audio Manifestation Tool</p>
    <h1>Subliminal<br>Studio</h1>
    <p class="subtitle">上传你的肯定语音频，叠加它，让它更深地进入潜意识</p>
  </header>

  <!-- Upload -->
  <div class="card">
    <p class="card-label">01 — 上传音频</p>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="audio/*">
      <span class="upload-icon shimmer">✦</span>
      <p class="upload-text">点击上传，或拖拽音频文件到这里</p>
      <p class="upload-hint">支持 MP3、WAV、AAC、OGG、FLAC 等格式</p>
      <p class="file-name" id="fileName" style="display:none"></p>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <p class="card-label">02 — 叠加设置</p>
    <div class="controls-grid">

      <!-- Mode -->
      <div class="control-group">
        <label>叠加模式</label>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="concat" onclick="setMode('concat', this)">
            🔗 顺序拼接
          </button>
          <button class="mode-btn" data-mode="overlay" onclick="setMode('overlay', this)">
            ✦ 同步叠加
          </button>
        </div>
        <p class="mode-desc" id="modeDesc">
          将肯定语重复 N 次，首尾相接拼成一段更长的音频
        </p>
      </div>

      <!-- Repeat count -->
      <div class="control-group">
        <label>重复次数</label>
        <div class="slider-display">
          <span class="slider-value" id="repeatVal">10</span>
          <span class="slider-unit">次</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="repeatSlider" min="2" max="100" value="10" oninput="updateSlider(this, 'repeatVal')">
          <div class="slider-ticks">
            <span>2</span><span>25</span><span>50</span><span>75</span><span>100</span>
          </div>
        </div>
      </div>

      <!-- Volume per layer (overlay only) -->
      <div class="control-group" id="volGroup" style="display:none">
        <label>每层音量 <span style="color:var(--accent);opacity:0.5" id="volPct">80%</span></label>
        <div class="volume-row">
          <span class="vol-label">🔈</span>
          <input type="range" id="volSlider" min="10" max="100" value="80"
                 oninput="document.getElementById('volPct').textContent=this.value+'%'; updateSlider(this,'')">
          <span class="vol-label">🔊</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Info -->
  <div class="card" style="padding:20px 28px">
    <div class="info-box">
      💡 <strong>顺序拼接</strong>：音频一个接一个，适合做长时间循环背景音<br>
      💡 <strong>同步叠加</strong>：多层音频同时播放，声音会更厚、更深沉，适合强化版 sub
    </div>
  </div>

  <!-- Process -->
  <div class="card">
    <p class="card-label">03 — 生成 & 下载</p>
    <button class="process-btn" id="processBtn" disabled onclick="processAudio()">
      ✦ 开始生成
    </button>

    <div class="progress-area" id="progressArea">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <p class="progress-text" id="progressText">正在处理...</p>
    </div>

    <div class="download-area" id="downloadArea">
      <p class="done-text">✦ 完成了，宝贝 ✦</p>
      <a class="download-btn" id="downloadLink" download="subliminal.wav">
        ⬇ 下载音频
      </a>
    </div>
  </div>

</div>

<script>
let audioBuffer = null;
let currentMode = 'concat';
let audioCtx = null;

// Particles
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.bottom = '0';
  p.style.animationDuration = (4 + Math.random() * 6) + 's';
  p.style.animationDelay = (Math.random() * 3) + 's';
  p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
  p.style.background = ['#c8a8ff','#f0c0e8','#8fd0ff'][Math.floor(Math.random()*3)];
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 10000);
}
setInterval(spawnParticle, 800);

// Slider
function updateSlider(el, valId) {
  const pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  if (valId) document.getElementById(valId).textContent = el.value;
}
updateSlider(document.getElementById('repeatSlider'), 'repeatVal');
updateSlider(document.getElementById('volSlider'), '');

// Mode
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const descs = {
    concat: '将肯定语重复 N 次，首尾相接拼成一段更长的音频',
    overlay: '多层音频同时播放叠加，声音更厚重深沉，适合强化版 sub'
  };
  document.getElementById('modeDesc').textContent = descs[mode];
  document.getElementById('volGroup').style.display = mode === 'overlay' ? 'block' : 'none';
}

// Upload
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  const nameEl = document.getElementById('fileName');
  nameEl.textContent = file.name;
  nameEl.style.display = 'block';
  uploadZone.classList.add('has-file');

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      if (!audioCtx) audioCtx = new AudioContext();
      audioBuffer = await audioCtx.decodeAudioData(e.target.result);
      document.getElementById('processBtn').disabled = false;
      hideDownload();
    } catch(err) {
      alert('无法解析音频文件，请尝试其他格式 (WAV/MP3)');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function hideDownload() {
  document.getElementById('downloadArea').classList.remove('show');
  document.getElementById('progressArea').classList.remove('show');
}

// Process
async function processAudio() {
  if (!audioBuffer) return;

  const repeats = parseInt(document.getElementById('repeatSlider').value);
  const volPct = parseInt(document.getElementById('volSlider').value) / 100;
  const mode = currentMode;

  document.getElementById('processBtn').disabled = true;
  document.getElementById('downloadArea').classList.remove('show');
  const progressArea = document.getElementById('progressArea');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  progressArea.classList.add('show');

  progressFill.style.width = '5%';
  progressText.textContent = '正在初始化...';

  await new Promise(r => setTimeout(r, 50));

  const sampleRate = audioBuffer.sampleRate;
  const channels = audioBuffer.numberOfChannels;
  const duration = audioBuffer.duration;

  let offlineCtx;

  if (mode === 'concat') {
    // Sequential concat
    const totalDuration = duration * repeats;
    offlineCtx = new OfflineAudioContext(channels, Math.ceil(sampleRate * totalDuration), sampleRate);

    for (let i = 0; i < repeats; i++) {
      const src = offlineCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(offlineCtx.destination);
      src.start(i * duration);

      progressFill.style.width = (5 + (i / repeats) * 60) + '%';
      progressText.textContent = `拼接第 ${i+1}/${repeats} 层...`;
      if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
    }
  } else {
    // Overlay
    offlineCtx = new OfflineAudioContext(channels, Math.ceil(sampleRate * duration), sampleRate);

    for (let i = 0; i < repeats; i++) {
      const gainNode = offlineCtx.createGain();
      gainNode.gain.value = volPct;
      const src = offlineCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(gainNode);
      gainNode.connect(offlineCtx.destination);
      src.start(0);

      progressFill.style.width = (5 + (i / repeats) * 60) + '%';
      progressText.textContent = `叠加第 ${i+1}/${repeats} 层...`;
      if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
    }
  }

  progressText.textContent = '渲染音频中...';
  progressFill.style.width = '70%';

  let rendered;
  try {
    rendered = await offlineCtx.startRendering();
  } catch(e) {
    alert('渲染失败：' + e.message);
    document.getElementById('processBtn').disabled = false;
    return;
  }

  progressFill.style.width = '88%';
  progressText.textContent = '编码 WAV 文件...';
  await new Promise(r => setTimeout(r, 30));

  const wavBlob = bufferToWav(rendered);
  const url = URL.createObjectURL(wavBlob);

  progressFill.style.width = '100%';
  progressText.textContent = '完成！';
  await new Promise(r => setTimeout(r, 400));
  progressArea.classList.remove('show');

  const dl = document.getElementById('downloadLink');
  dl.href = url;
  dl.download = `subliminal_x${repeats}_${mode}.wav`;
  document.getElementById('downloadArea').classList.add('show');
  document.getElementById('processBtn').disabled = false;

  // Burst particles
  for (let i = 0; i < 12; i++) spawnParticle();
}

// WAV encoder
function bufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const samples = buffer.length;
  const blockAlign = numChannels * bitDepth / 8;
  const byteRate = sampleRate * blockAlign;
  const dataSize = samples * blockAlign;
  const bufSize = 44 + dataSize;

  const ab = new ArrayBuffer(bufSize);
  const view = new DataView(ab);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeStr(0, 'RIFF');
  view.setUint32(4, bufSize - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
      view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
      offset += 2;
    }
  }

  return new Blob([ab], { type: 'audio/wav' });
}
